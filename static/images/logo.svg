  <line x1="10" y1="20" x2="30" y2="8"  stroke="#e8620a" stroke-width="1.5" opacity="0.7"/>
  <line x1="10" y1="20" x2="30" y2="32" stroke="#e8620a" stroke-width="1.5" opacity="0.7"/>
