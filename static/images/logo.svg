  <!-- Text -->
  <text x="58" y="15" font-family="system-ui, sans-serif" font-size="11" font-weight="800" fill="#e8f0ff" letter-spacing="1">HOUSTON</text>
  <text x="58" y="30" font-family="system-ui, sans-serif" font-size="11" font-weight="800" fill="#e8620a" letter-spacing="2">MESH</text>
