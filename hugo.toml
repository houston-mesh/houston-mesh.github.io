baseURL = "https://houston-mesh.github.io/"
languageCode = "en-us"
title = "HoustonMesh"
theme = "PaperMod"
paginate = 5
enableRobotsTXT = true
buildDrafts = false
buildFuture = false
buildExpired = false
disableKinds = ["taxonomy", "term"]

[sitemap]
  changefreq = "weekly"
  priority = 0.5
  filename = "sitemap.xml"

[params]
  env = "production"
  title = "HoustonMesh"
  description = "A free, off-grid text messaging network for Houston built on Meshtastic and LoRa radio."
  keywords = ["HoustonMesh", "Meshtastic", "MeshCore", "LoRa", "Houston", "mesh network", "off-grid", "community radio"]
  author = "HoustonMesh"
  images = ["/images/logo.svg"]
  DateFormat = "January 2, 2006"
  defaultTheme = "dark"
  disableThemeToggle = true
  ShowReadingTime = true
  ShowShareButtons = false
  ShowPostNavLinks = true
  ShowBreadCrumbs = true
  ShowCodeCopyButtons = true
  ShowWordCount = false
  ShowRssButtonInSectionTermList = true
  UseHugoToc = true
  disableSpecial1stPost = false
  disableScrollToTop = false
  comments = false
  hidemeta = false
  hideSummary = false
  showtoc = false
  tocopen = false

  [params.homeInfoParams]
    Title = "Houston's Free Off-Grid Mesh Network"
    Content = """
**HoustonMesh** is a community-run, free text messaging network built on **Meshtastic** and **LoRa radio** — no internet required, no cell service needed, no central server, no corporation.

We're a group of Houston volunteers deploying solar-powered LoRa radio repeaters across the city so anyone with a Meshtastic device can send messages, share their location, and stay in contact — even when the grid goes down.

Join the community. Get a device. Be part of the mesh.
"""

  [[params.socialIcons]]
    name = "github"
    url = "https://github.com/houstonmesh"

  [[params.socialIcons]]
    name = "email"
    url = "mailto:info@houstonmesh.net"

  [params.label]
    text = "HoustonMesh"
    icon = "/images/logo.svg"
    iconHeight = 35

  [params.cover]
    hidden = false
    hiddenInList = false
    hiddenInSingle = false

  [params.editPost]
    disabled = true

  [params.fuseOpts]
    isCaseSensitive = false
    shouldSort = true
    location = 0
    distance = 1000
    threshold = 0.4
    minMatchCharLength = 0
    limit = 10
    keys = ["title", "permalink", "summary", "content"]

[menu]
  [[menu.main]]
    identifier = "home"
    name = "Home"
    url = "/"
    weight = 5
  [[menu.main]]
    identifier = "learn"
    name = "Learn"
    weight = 10
  [[menu.main]]
    identifier = "about"
    name = "About"
    url = "/about/"
    parent = "learn"
    weight = 1
  [[menu.main]]
    identifier = "meshcore-vs-meshtastic"
    name = "MeshCore vs Meshtastic"
    url = "/learn/meshcore-vs-meshtastic/"
    parent = "learn"
    weight = 2
  [[menu.main]]
    identifier = "node-positioning"
    name = "Node Positioning"
    url = "/learn/node-positioning/"
    parent = "learn"
    weight = 3
  [[menu.main]]
    identifier = "faq"
    name = "FAQ"
    url = "/learn/faq/"
    parent = "learn"
    weight = 4

[outputs]
  home = ["HTML", "RSS", "JSON"]
